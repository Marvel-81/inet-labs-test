name: inet-lab-test

networks:
  inet-lab:
    name: inet-lab
    driver: bridge

services:
  php:
    build: ./images/php
    container_name: inet-lab-php
    volumes:
      - ./www:/var/www
    networks:
      - inet-lab
    depends_on:
      - mysql
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - TZ=Europe/Moscow
  mysql:
    container_name: inet-lab-mysql
    image: mysql:9.3.0
    command: sh -c "rm -f /var/lib/mysql/mysql.sock && docker-entrypoint.sh mysqld"
    volumes:
      - ./mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: tempbase
      MYSQL_DATABASE: tempbase
      MYSQL_USER: tempbase
      MYSQL_PASSWORD: tempbase
    networks:
      - inet-lab
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
    user: "999:999"

  nginx:
    container_name: inet-lab-nginx
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./www:/var/www
    networks:
      - inet-lab
    depends_on:
      php:
        condition: service_healthy

  worker:
    container_name: inet-lab-worker
    build: 
      context: ./images/worker
      dockerfile: Dockerfile
    volumes:
      - ./www:/var/www
    networks:
      - inet-lab
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - TZ=Europe/Moscow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php", "artisan", "queue:flush"]
      interval: 60s
      timeout: 10s
      retries: 3